server:
  port: 8085
  address: 0.0.0.0
  error:
    whitelabel:
      enabled: false
management:
  endpoint:
    health:
      show-details: when-authorized
  server:
    port: 8185
spring:
  main:
    allow-circular-references: true
  profiles:
    active: dev
  application:
    name: pedimed
  data:
    jpa:
      repositories:
        enabled: true
  jpa:
    open-in-view: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
        order_by:
          default_null_ordering: last
          types:
            print:
              banner: false
        format_sql: false
    hikari:
      pool-name: pedimed
      register-mbeans: true
      maximum-pool-size: 8
  flyway:
    baselineOnMigrate: true
    locations:
      - classpath:/db/migration
  sql:
    init:
      platform: postgresql
logging:
  level:
    root: info
    web: info
    tomcat: info
    hibernate: debug
    org.springframework.orm.jpa: debug
    flywaydb: debug
jwt:
  secret: ${JWT_SECRET:dev-only-insecure-secret-change-for-prod-at-least-64-chars-long!}
  expirationMs: 28000000

---
#################################################################
#                              DEV                              #
#################################################################
spring:
  config:
    activate:
      on-profile: dev
  application:
    name: pedimed-dev
  flyway:
    user: ${DB_USERNAME_DEV:postgres}
    password: ${DB_PASSWORD_DEV:postgres}
  datasource:
    url: jdbc:postgresql://${DB_URL_DEV:localhost:5432/pedimed}
    username: ${DB_USERNAME_DEV:postgres}
    password: ${DB_PASSWORD_DEV:postgres}
    hikari:
      pool-name: pedimed
      register-mbeans: true
      maximum-pool-size: 8
  jpa:
    show-sql: true

logging:
  level:
    root: info
---
#################################################################
#                              PROD                             #
#################################################################
spring:
  config:
    activate:
      on-profile: prod
  application:
    name: pedimed
  flyway:
    user: ${DB_USERNAME_PROD}
    password: ${DB_PASSWORD_PROD}
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_URL_PROD}
    username: ${DB_USERNAME_PROD}
    password: ${DB_PASSWORD_PROD}
    hikari:
      pool-name: pedimed
      register-mbeans: true
      maximum-pool-size: 8

logging:
  level:
    root: warn
