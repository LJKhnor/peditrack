name: CI/CD

on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [develop, master]
  workflow_dispatch:

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Start test database
        run: docker compose up -d

      - name: Wait for PostgreSQL
        run: |
          timeout 60 bash -c '
            until docker exec pedimed_postgres pg_isready -U postgres -d pedimed; do
              sleep 2
            done
          '

      - name: Build and test
        run: mvn --batch-mode verify
