name: CI/CD

on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [develop, master]
  workflow_dispatch:

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Start test database
        run: docker compose up -d

      - name: Wait for PostgreSQL
        run: |
          timeout 60 bash -c '
            until docker exec pedimed_postgres pg_isready -U postgres -d pedimed; do
              sleep 2
            done
          '

      - name: Build and test
        run: mvn --batch-mode verify

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        # Pin to a commit SHA for supply-chain security once version is validated:
        # uses: appleboy/ssh-action@<SHA>
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 120s
          script: |
            set -e
            cd /var/www/pedimed/peditrack
            git pull --ff-only origin master
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

      - name: Check service health
        run: |
          sleep 15
          curl -f http://${{ secrets.PROD_HOST }}/health
