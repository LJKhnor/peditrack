name: CI/CD

on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [develop, master]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build
        run: mvn --batch-mode package -DskipTests

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Start test database
        run: |
          touch init.sql
          docker compose up -d

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            STATUS=$(docker inspect --format='{{.State.Status}}' pedimed_postgres 2>/dev/null || echo "missing")
            if [ "$STATUS" = "exited" ] || [ "$STATUS" = "dead" ]; then
              echo "Container crashed. Logs:"
              docker logs pedimed_postgres
              exit 1
            fi
            if docker exec pedimed_postgres pg_isready -U postgres -d pedimed 2>/dev/null; then
              echo "PostgreSQL is ready."
              exit 0
            fi
            echo "Attempt $i/30 - waiting..."
            sleep 2
          done
          echo "Timeout: PostgreSQL never became ready."
          docker logs pedimed_postgres
          exit 1

      - name: Test
        run: mvn --batch-mode verify -DskipTests=false